<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery Agêntico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .chat-container { width: 1440px; height: 92vh; max-height: 860px; background: #ffffff; border-radius: 16px; border: 1px solid #e2e0d6; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 32px rgba(0,0,0,0.06); }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid #eeece4; background: #fafaf7; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; background: #fafaf7; scroll-behavior: smooth; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d3d1c7; border-radius: 2px; }
    .msg-row { display: flex; max-width: 80%; animation: fadeIn 0.2s ease; }
    .msg-row.system { align-self: flex-start; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
    .avatar.sys { background: #E1F5EE; color: #0F6E56; margin-right: 8px; }
    .avatar.usr { background: #EEEDFE; color: #534AB7; margin-left: 8px; }
    .bubble { padding: 10px 14px; font-size: 13.5px; line-height: 1.6; }
    .bubble.sys { background: #ffffff; border: 1px solid #e2e0d6; color: #2C2C2A; border-radius: 4px 12px 12px 12px; }
    .bubble.usr { background: #EEEDFE; color: #3C3489; border-radius: 12px 4px 12px 12px; }
    .bubble p { margin-bottom: 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul { padding-left: 16px; margin-top: 4px; }
    .bubble ul li { margin-bottom: 2px; }
    .timestamp { font-size: 10.5px; color: #B4B2A9; margin-top: 4px; padding: 0 2px; }
    .timestamp.right { text-align: right; }
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 12px 14px; background: #ffffff; border: 1px solid #e2e0d6; border-radius: 4px 12px 12px 12px; width: fit-content; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #B4B2A9; animation: typing 1.2s ease infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    .pdf-badge { display: inline-flex; align-items: center; gap: 6px; background: #F1EFE8; border: 1px solid #d3d1c7; border-radius: 8px; padding: 6px 10px; font-size: 12px; color: #5F5E5A; margin-top: 4px; }
    .download-btn { display: inline-flex; align-items: center; gap: 6px; background: #1D9E75; color: #ffffff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
    .download-btn:hover { background: #0F6E56; }
    .start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 24px; background: #fafaf7; padding: 40px; }
    .start-btn { background: #1D9E75; color: #ffffff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .start-btn:hover { background: #0F6E56; }
    .start-btn:active { transform: scale(0.98); }
    .input-area { border-top: 1px solid #eeece4; padding: 12px 16px; display: flex; align-items: flex-end; gap: 8px; background: #ffffff; flex-shrink: 0; }
    .input-box { flex: 1; border: 1px solid #d3d1c7; border-radius: 10px; padding: 9px 13px; font-size: 13.5px; resize: none; min-height: 40px; max-height: 120px; font-family: 'DM Sans', sans-serif; background: #fafaf7; color: #2C2C2A; outline: none; transition: border-color 0.15s; line-height: 1.5; }
    .input-box:focus { border-color: #1D9E75; background: #ffffff; }
    .input-box::placeholder { color: #B4B2A9; }
    .btn-icon { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #d3d1c7; background: #fafaf7; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #888780; flex-shrink: 0; transition: background 0.15s, color 0.15s; }
    .btn-icon:hover { background: #F1EFE8; color: #444441; }
    .btn-send { width: 36px; height: 36px; border-radius: 8px; border: none; background: #1D9E75; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #ffffff; flex-shrink: 0; transition: background 0.15s; }
    .btn-send:hover { background: #0F6E56; }
    .btn-send:disabled { background: #d3d1c7; cursor: not-allowed; }
    code { background: #F1EFE8; padding: 1px 5px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 12px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes typing { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="status-dot" id="statusDot"></div>
    <span style="font-size:14px;font-weight:500;color:#2C2C2A">Discovery Agêntico</span>
    <span style="font-size:12px;color:#B4B2A9;margin-left:auto" id="companyLabel"></span>
  </div>

  <!-- Start screen -->
  <div class="start-screen" id="startScreen">
    <div style="text-align:center">
      <div style="font-size:32px;margin-bottom:12px">🔍</div>
      <h1 style="font-size:20px;font-weight:500;color:#2C2C2A;margin-bottom:8px">Discovery Agêntico</h1>
      <p style="font-size:13.5px;color:#888780;max-width:340px;line-height:1.6">Mapeamento automatizado da folha de pagamento — rubricas, fórmulas, dependências e base legal.</p>
    </div>
    <button class="start-btn" onclick="startDiscovery()">▶ Iniciar análise</button>
  </div>

  <!-- Chat messages -->
  <div class="chat-messages" id="messages" style="display:none"></div>

  <!-- Input area -->
  <div class="input-area" id="inputArea" style="display:none">
    <label class="btn-icon" title="Anexar PDF" id="attachBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
      </svg>
      <input type="file" accept=".pdf" id="fileInput" style="display:none" multiple onchange="handleFileSelected()" />
    </label>
    <textarea class="input-box" id="inputBox" placeholder="Digite sua mensagem..." rows="1"
      onInput="autoResize(this)"
      onKeydown="handleKey(event)"></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Enviar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>

</div>

<script>
  const BACKEND = '';
  let discoveryId = null;
  let stage = null;
  let pendingFiles = [];
  let pdfData = null;
  let pdfFilename = null;

  function now() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addMessage(role, content, isHTML = false) {
    const msgs = document.getElementById('messages');
    const time = now();
    const isSystem = role === 'system';

    const row = document.createElement('div');
    row.className = `msg-row ${isSystem ? 'system' : 'user'}`;

    const avatarClass = isSystem ? 'sys' : 'usr';
    const bubbleClass = isSystem ? 'sys' : 'usr';
    const tsClass = isSystem ? '' : 'right';
    const avatarIcon = isSystem ? '🤖' : '👤';

    const contentHTML = isHTML ? content : escapeAndFormat(content);

    // Botões contextuais baseados no conteúdo da mensagem
    let extraButtons = '';
    if (isSystem && content.includes('Pular CCT')) {
      extraButtons = `<div style="margin-top:10px"><button onclick="skipCCT()" style="background:#f5f4f0;border:1px solid #d3d1c7;border-radius:8px;padding:6px 14px;font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;color:#5F5E5A">⏭️ Pular CCT</button></div>`;
    }
    if (isSystem && content.includes('Pular perguntas')) {
      extraButtons = `<div style="margin-top:10px"><button onclick="skipQuestions()" style="background:#f5f4f0;border:1px solid #d3d1c7;border-radius:8px;padding:6px 14px;font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;color:#5F5E5A">⚡ Pular perguntas</button></div>`;
    }
    if (isSystem && content.includes('Continuar')) {
      extraButtons = `<div style="margin-top:10px"><button onclick="continueFlow()" style="background:#1D9E75;border:none;border-radius:8px;padding:6px 14px;font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;color:#ffffff">Continuar →</button></div>`;
    }
		if (isSystem && content.includes('Gerar blueprint')) {
  		extraButtons = `<div style="margin-top:10px"><button onclick="gerarBlueprint()" style="background:#1D9E75;border:none;border-radius:8px;padding:6px 14px;font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;color:#ffffff">🗺️ Gerar blueprint</button></div>`;
		}

    row.innerHTML = `
      <div class="avatar ${avatarClass}" aria-hidden="true">${avatarIcon}</div>
      <div>
        <div class="bubble ${bubbleClass}">${contentHTML}${extraButtons}</div>
        <div class="timestamp ${tsClass}">${time}</div>
      </div>
    `;

    msgs.appendChild(row);
    scrollToBottom();
    return row;
  }

  function escapeAndFormat(text) {
    const escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    return escaped
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.*?)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row system';
    row.id = 'typingIndicator';
    row.innerHTML = `
      <div class="avatar sys" aria-hidden="true">🤖</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    msgs.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function setInputEnabled(enabled) {
    const btn = document.getElementById('sendBtn');
    const inp = document.getElementById('inputBox');
    btn.disabled = !enabled;
    inp.disabled = !enabled;
  }

  function handleFileSelected() {
    const input = document.getElementById('fileInput');
    pendingFiles = Array.from(input.files);
    if (pendingFiles.length > 0) {
      const names = pendingFiles.map(f => f.name).join(', ');
      document.getElementById('inputBox').placeholder = `📎 ${names} — pressione Enter para enviar`;
    }
  }

  async function filesToB64(files) {
    const results = [];
    for (const file of files) {
      const b64 = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
      results.push(b64);
    }
    return results;
  }

  async function startDiscovery() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
    document.getElementById('inputArea').style.display = 'flex';

    setInputEnabled(false);
    showTyping();

    const res = await fetch(`${BACKEND}/streamlit/mensagem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto: 'iniciar análise', discovery_id: null })
    });
    const data = await res.json();
    removeTyping();

    if (data.discovery_id) discoveryId = data.discovery_id;
    addMessage('system', data.mensagem || '');
    await refreshStage();
    setInputEnabled(true);
    document.getElementById('inputBox').focus();
  }

  async function sendMessage() {
    const inp = document.getElementById('inputBox');
    const text = inp.value.trim();
    const files = pendingFiles;

    if (!text && files.length === 0) return;
    setInputEnabled(false);

    // Exibe mensagem do user
    if (files.length > 0) {
      const names = files.map(f => f.name).join(', ');
      const displayText = text || `📎 ${names}`;
      addMessage('user', displayText);
    } else {
      addMessage('user', text);
    }

    inp.value = '';
    inp.style.height = 'auto';
    inp.placeholder = 'Digite sua mensagem...';
    pendingFiles = [];
    document.getElementById('fileInput').value = '';

    showTyping();

    try {
      let pdfsB64 = null;
      let tipoPdf = null;

      if (files.length > 0) {
        pdfsB64 = await filesToB64(files);
        tipoPdf = stage === 'cct' ? 'cct' : 'holerite';
      }

      const payload = {
        texto: text || (tipoPdf === 'cct' ? 'cct enviada' : 'holerites enviados'),
        discovery_id: discoveryId,
        pdfs_b64: pdfsB64,
        tipo_pdf: tipoPdf
      };

      const res = await fetch(`${BACKEND}/streamlit/mensagem`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      removeTyping();

      if (data.discovery_id) discoveryId = data.discovery_id;

      if (data.pdf_b64) {
        pdfData = data.pdf_b64;
        pdfFilename = data.pdf_filename || 'planta.pdf';
        addMessage('system', data.mensagem || '');
        addDownloadButton();
      } else {
        addMessage('system', data.mensagem || '');
      }

      await refreshStage();

    } catch (err) {
      removeTyping();
      addMessage('system', '⚠️ Erro ao conectar ao servidor. Tente novamente.');
    }

    setInputEnabled(true);
    document.getElementById('inputBox').focus();
  }

  function addDownloadButton() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.style.paddingLeft = '36px';
    div.innerHTML = `
      <button class="download-btn" onclick="downloadPDF()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Baixar Planta de Cálculo (PDF)
      </button>
    `;
    msgs.appendChild(div);
    scrollToBottom();
  }

  function downloadPDF() {
    const bytes = Uint8Array.from(atob(pdfData), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = pdfFilename;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function refreshStage() {
    if (!discoveryId) return;
    try {
      const res = await fetch(`${BACKEND}/discovery/${discoveryId}/stage`);
      const data = await res.json();
      stage = data.stage;
      updateCompanyLabel();
    } catch (e) {}
  }

  async function updateCompanyLabel() {
    const label = document.getElementById('companyLabel');
    if (discoveryId && stage && stage !== 'identification') {
      label.textContent = stage === 'done' ? 'Concluído' : 'Em andamento';
    }
  }

	async function skipCCT() {
    addMessage('user', 'pular');
    setInputEnabled(false);
    showTyping();
    const res = await fetch(`${BACKEND}/streamlit/mensagem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto: 'pular', discovery_id: discoveryId })
    });
    const data = await res.json();
    removeTyping();
    if (data.discovery_id) discoveryId = data.discovery_id;
    addMessage('system', data.mensagem || '');
    await refreshStage();
    setInputEnabled(true);
  }

  async function skipQuestions() {
    addMessage('user', 'pular');
    setInputEnabled(false);
    showTyping();
    const res = await fetch(`${BACKEND}/streamlit/mensagem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto: 'pular', discovery_id: discoveryId })
    });
    const data = await res.json();
    removeTyping();
    if (data.discovery_id) discoveryId = data.discovery_id;
    if (data.pdf_b64) {
      pdfData = data.pdf_b64;
      pdfFilename = data.pdf_filename || 'planta.pdf';
      addMessage('system', data.mensagem || '');
      addDownloadButton();
    } else {
      addMessage('system', data.mensagem || '');
    }
    await refreshStage();
    setInputEnabled(true);
  }

  async function continueFlow() {
    addMessage('user', 'continuar');
    setInputEnabled(false);
    showTyping();
    const res = await fetch(`${BACKEND}/streamlit/mensagem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto: 'continuar', discovery_id: discoveryId })
    });
    const data = await res.json();
    removeTyping();
    if (data.discovery_id) discoveryId = data.discovery_id;
    addMessage('system', data.mensagem || '');
    await refreshStage();
    setInputEnabled(true);
  }

	async function gerarBlueprint() {
    addMessage('user', 'gerar');
    setInputEnabled(false);
    showTyping();
    const res = await fetch(`${BACKEND}/streamlit/mensagem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto: 'gerar', discovery_id: discoveryId })
    });
    const data = await res.json();
    removeTyping();
    if (data.discovery_id) discoveryId = data.discovery_id;
    if (data.pdf_b64) {
      pdfData = data.pdf_b64;
      pdfFilename = data.pdf_filename || 'planta.pdf';
      addMessage('system', data.mensagem || '');
      addDownloadButton();
    } else {
      addMessage('system', data.mensagem || '');
    }
    await refreshStage();
    setInputEnabled(true);
  }


</script>

</body>
</html>
